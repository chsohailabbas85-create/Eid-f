<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: url('227003.jpg') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        overflow: hidden;
    }

    .container {
        color: #fff;
        animation: fadeIn 2s ease-in-out;
        padding: 20px;
        max-width: 90%;
    }

    h1 {
        font-size: 4rem;
        color: gold;
        text-shadow: 0 0 20px gold, 0 0 40px orange;
        animation: glow 2s infinite alternate;
    }

    /* 🔥 Arabic upgraded */
    .arabic {
        font-size: 2.2rem;
        margin-top: 15px;
        direction: rtl;
        font-weight: 900;
        line-height: 1.8;

        background: linear-gradient(45deg, gold, orange, white, gold);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        animation: arabicGlow 3s infinite alternate, fadeInUp 2s ease;
    }

    p {
        font-size: 1.3rem;
        margin-top: 15px;
        animation: fadeInUp 2s ease;
        line-height: 1.6;
    }

    /* Animations */
    @keyframes glow {
        from {
            text-shadow: 0 0 10px gold, 0 0 20px orange;
        }
        to {
            text-shadow: 0 0 30px gold, 0 0 60px orange;
        }
    }

    @keyframes arabicGlow {
        0% {
            text-shadow: 0 0 10px gold, 0 0 20px orange;
        }
        100% {
            text-shadow: 0 0 25px gold, 0 0 50px orange;
        }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Sparkles */
    .sparkle {
        position: absolute;
        width: 5px;
        height: 5px;
        background: gold;
        border-radius: 50%;
        animation: sparkle 5s linear infinite;
    }

    @keyframes sparkle {
        0% {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        100% {
            transform: translateY(-800px) scale(0);
            opacity: 0;
        }
    }
</style>

</head>
<body>

<div class="container">
    <h1>Eid Mubarak</h1>

    <div class="arabic">
        عيد مبارك 🌙✨<br>
        أعاده الله عليكم بالخير واليمن والبركات<br>
        تقبل الله منا ومنكم صالح الأعمال
    </div>

    <p>
        May Allah fill your life with happiness, peace, and blessings ✨<br><br>
        Regards,<br>
        Sohail Abbas
    </p>
</div>

<!-- Sparkles Script -->
<script>
    for (let i = 0; i < 50; i++) {
        let sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");

        sparkle.style.left = Math.random() * window.innerWidth + "px";
        sparkle.style.top = Math.random() * window.innerHeight + "px";
        sparkle.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(sparkle);
    }
</script>

</body>
</html>
